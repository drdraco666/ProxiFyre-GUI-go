<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProxiFyre Configuration Editor</title>
    <link rel="stylesheet" href="./src/style.css">
</head>
<body>
    <div id="app">
        <div class="container">
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-button active" data-tab="main">🔧 Main</button>
                <button class="tab-button" data-tab="service">⚙️ Service</button>
            </div>

            <!-- Main Tab -->
            <div id="main-tab" class="tab-content active">
                <!-- Top row: Proxy Settings and Applications -->
                <div class="top-row">
                    <!-- Proxy Settings -->
                    <div class="section">
                        <h2>🔧 Proxy Settings</h2>
                        <div class="proxy-selector">
                            <label for="proxySelect">Select Proxy:</label>
                            <select id="proxySelect"></select>
                            <button id="addProxyBtn" class="btn btn-secondary btn-small">➕ Add</button>
                            <button id="removeProxyBtn" class="btn btn-danger btn-small">✕ Remove</button>
                        </div>
                        <div class="form-group">
                            <label for="endpoint">Socks5 Proxy Endpoint:</label>
                            <input type="text" id="endpoint" placeholder="Enter proxy endpoint...">
                        </div>
                        <div class="form-group">
                            <label for="username">Username:</label>
                            <input type="text" id="username" placeholder="Enter username...">
                        </div>
                        <div class="form-group">
                            <label for="password">Password:</label>
                            <input type="password" id="password" placeholder="Enter password...">
                        </div>
                        <div class="form-group">
                            <label for="logLevel">Log Level:</label>
                            <select id="logLevel">
                                <option value="Error">Error</option>
                                <option value="Warning">Warning</option>
                                <option value="Info">Info</option>
                                <option value="Debug">Debug</option>
                            </select>
                        </div>
                    </div>

                    <!-- Applications -->
                    <div class="section">
                        <h2>📱 Applications to Proxy</h2>
                        <div class="apps-list" id="appsList">
                            <!-- Applications will be added dynamically -->
                        </div>
                        <div class="apps-controls">
                            <button id="addAppBtn" class="btn btn-secondary btn-small">➕ Add</button>
                        </div>
                    </div>
                </div>

                <!-- Action buttons below top blocks -->
                <div class="top-actions">
                    <button id="saveBtn" class="btn btn-primary btn-small">💾 Save</button>
                    <button id="refreshBtn" class="btn btn-secondary btn-small">🔄 Refresh</button>
                </div>

                <!-- Application Control -->
                <div class="section">
                    <h2>🎮 Application Control</h2>
                    <div class="control-buttons">
                        <button id="runBtn" class="btn btn-success btn-small">▶️ Run</button>
                        <button id="stopBtn" class="btn btn-danger btn-small">⏹️ Stop</button>
                        <button id="downloadBtn" class="btn btn-primary btn-small">⬇️ Download</button>
                    </div>
                </div>

                <!-- Console -->
                <div class="section">
                    <h2>💻 ProxiFyre Console</h2>
                    <div class="console" id="console">
                        <!-- Console will be filled dynamically -->
                    </div>
                    <div class="console-controls">
                        <button id="clearConsoleBtn" class="btn btn-secondary btn-small">🧹 Clear</button>
                        <button id="copyConsoleBtn" class="btn btn-secondary btn-small">📋 Copy</button>
                    </div>
                </div>
            </div>

            <!-- Service Tab -->
            <div id="service-tab" class="tab-content">
                <!-- Service Information -->
                <div class="section">
                    <h2>ℹ️ Service Information</h2>
                    <p>This tab contains functions for managing ProxiFyre as a Windows system service.</p>
                    <p class="warning">⚠️ All operations require administrator privileges.</p>
                </div>

                <!-- Service Control -->
                <div class="section">
                    <h2>⚙️ Service Control</h2>
                    <div class="service-controls">
                        <button id="installServiceBtn" class="btn btn-primary btn-small">📥 Install</button>
                        <button id="uninstallServiceBtn" class="btn btn-secondary btn-small">🗑️ Uninstall</button>
                        <button id="startServiceBtn" class="btn btn-success btn-small">▶️ Start</button>
                        <button id="stopServiceBtn" class="btn btn-danger btn-small">⏹️ Stop</button>
                    </div>
                </div>

                <!-- Service Status -->
                <div class="section">
                    <h2>📊 Service Status</h2>
                    <div class="service-status">
                        <span id="serviceStatus">Status: Unknown</span>
                        <button id="refreshStatusBtn" class="btn btn-secondary btn-small">🔄 Refresh</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
